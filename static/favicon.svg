<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="sky" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="lens" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#6ec6ff"/>
      <stop offset="60%" stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <linearGradient id="tube" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="50%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
    <linearGradient id="stand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#5d4037"/>
    </linearGradient>
  </defs>
  <!-- background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#sky)" stroke="#2a2a5a" stroke-width="1"/>
  <!-- stars -->
  <circle cx="10" cy="12" r="1" fill="#fff" opacity="0.9"/>
  <circle cx="52" cy="8" r="1.2" fill="#fff" opacity="0.8"/>
  <circle cx="48" cy="22" r="0.8" fill="#fff" opacity="0.7"/>
  <circle cx="14" cy="26" r="0.7" fill="#fff" opacity="0.6"/>
  <circle cx="8" cy="42" r="0.9" fill="#fff" opacity="0.5"/>
  <circle cx="56" cy="38" r="0.6" fill="#fff" opacity="0.7"/>
  <circle cx="24" cy="8" r="0.8" fill="#fff" opacity="0.8"/>
  <circle cx="40" cy="14" r="0.6" fill="#fff" opacity="0.6"/>
  <circle cx="18" cy="18" r="1" fill="#ffd54f" opacity="0.9"/>
  <!-- 4-point star sparkle -->
  <path d="M53 28 L54 30 L53 32 L52 30 Z" fill="#fff" opacity="0.9"/>
  <!-- tripod legs -->
  <line x1="32" y1="42" x2="20" y2="56" stroke="url(#stand)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="44" y2="56" stroke="url(#stand)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="32" y2="58" stroke="url(#stand)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- telescope tube -->
  <rect x="18" y="30" width="28" height="10" rx="3" fill="url(#tube)" transform="rotate(-25, 32, 35)"/>
  <!-- lens -->
  <ellipse cx="20.5" cy="29" rx="6" ry="5.5" fill="url(#lens)" transform="rotate(-25, 20.5, 29)" stroke="#0d47a1" stroke-width="0.8"/>
  <!-- lens glare -->
  <ellipse cx="18.5" cy="27" rx="2" ry="1.5" fill="#fff" opacity="0.35" transform="rotate(-25, 18.5, 27)"/>
  <!-- eyepiece -->
  <rect x="44" y="33" width="5" height="6" rx="1.5" fill="#757575" transform="rotate(-25, 46, 36)"/>
  <!-- finder scope -->
  <rect x="24" y="27" width="10" height="3" rx="1" fill="#bdbdbd" transform="rotate(-25, 29, 28.5)"/>
</svg>
